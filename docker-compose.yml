version: '3'
services:
  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        REACT_APP_DISPLAY_VERSION: v2
    image: eurobot_av_client
    container_name: eurobot_client
    ports:
      - '80:3000'
    environment:
      - REACT_APP_DISPLAY_VERSION=v2
    depends_on:
      - server

  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    image: eurobot_av_server
    container_name: eurobot_server
    ports:
      - '3001:3001'
    environment:
      - DB_CONNECTION_STRING=mongodb://mongodb:27017/EurobotDB
      - CLIENT_URL=http://10.166.174.67
      - JTW_SECRET_KEY=your-secret-key
    depends_on:
      - mongodb
    networks:
      - mynetwork

  mongodb:
    image: mongo:4.4
    container_name: mongodb
    networks:
      - mynetwork

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - mynetwork

networks:
  mynetwork:
